name: Haskell CI

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-haskell@v1
      with:
        ghc-version: '9.14.1'
        enable-stack: false
        cabal-version: '3.12.1'

    - name: Install Z3
      run: |
        wget https://github.com/Z3Prover/z3/releases/download/z3-4.15.4/z3-4.15.4-x64-glibc-2.39.zip
        unzip z3-4.15.4-x64-glibc-2.39.zip
        rm -f z3-4.15.4-x64-glibc-2.39.zip
        sudo cp z3-4.15.4-x64-glibc-2.39/bin/libz3.a /usr/local/lib
        sudo cp z3-4.15.4-x64-glibc-2.39/bin/z3 /usr/local/bin
        sudo cp z3-4.15.4-x64-glibc-2.39/include/* /usr/local/include
        rm -rf z3-4.15.4-x64-glibc-2.39
        z3 --version
    - name: Build Examples
      run: |
        cabal update
        cabal build
